[phases.setup]
nixPkgs = ["php81", "curl"]

[phases.install]
cmds = [
  "curl -sS https://getcomposer.org/installer | php",
  "chmod +x composer.phar",
  "mv composer.phar /usr/bin/composer",
  "cd becraft && composer install --no-dev --optimize-autoloader && php artisan config:cache"
]

[start]
cmd = "cd becraft && php -S 0.0.0.0:$PORT public/index.php"
