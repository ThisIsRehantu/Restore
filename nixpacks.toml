[phases.setup]
nixPkgs = ["php81"]

[phases.install]
cmds = [
  "curl -sS https://getcomposer.org/installer | php",
  "mv composer.phar /usr/local/bin/composer",
  "cd becraft && composer install --no-dev --optimize-autoloader"
]

[start]
cmd = "cd becraft && php artisan serve --host=0.0.0.0 --port=$PORT"
